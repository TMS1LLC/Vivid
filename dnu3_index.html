<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ONE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
:root { --green: #00ff41; --safe-bottom: env(safe-area-inset-bottom,0px); --safe-top: env(safe-area-inset-top,0px); }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; position:fixed; inset:0; }
#ui {
  position:fixed; bottom:0; left:0; right:0;
  padding: 10px 12px calc(10px + var(--safe-bottom));
  display:flex; flex-direction:column; align-items:center; gap:8px;
  background: linear-gradient(transparent, rgba(0,8,0,0.9));
  z-index:10; font-family:'Share Tech Mono',monospace;
  transition: opacity 0.5s;
}
#ui.hidden { opacity:0; pointer-events:none; }
.btn-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
button {
  background: rgba(0,255,65,0.07);
  border: 1px solid rgba(0,255,65,0.3);
  color: #00ff41;
  padding: 9px 18px; border-radius:3px; cursor:pointer;
  font-size:12px; font-family:'Share Tech Mono',monospace;
  min-height:38px; letter-spacing:0.05em; text-transform:uppercase;
  transition: all 0.15s; -webkit-appearance:none;
}
button:hover { background:rgba(0,255,65,0.18); border-color:#00ff41; }
button.active { background:rgba(0,255,65,0.22); border-color:#00ff41; color:#fff; box-shadow:0 0 10px rgba(0,255,65,0.35); }
#status {
  color:rgba(0,255,65,0.5); font-size:11px;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:0.1em; text-transform:uppercase;
}
#status.live { color:#00ff41; text-shadow:0 0 8px #00ff41; }
#status.error { color:#ff4141; }
#status.flow { color:#fff; text-shadow:0 0 20px #fff, 0 0 40px rgba(0,255,65,0.8); }
#one-title {
  position:fixed; top:calc(16px + var(--safe-top)); left:50%; transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:0.4em; color:rgba(0,255,65,0.4);
  text-transform:uppercase; pointer-events:none; transition:all 0.5s; z-index:20;
}
#toggle-ui {
  position:fixed; top:calc(12px + var(--safe-top)); right:14px;
  width:36px; height:36px; background:rgba(0,255,65,0.08);
  border:1px solid rgba(0,255,65,0.3); border-radius:3px; color:#00ff41;
  font-size:16px; font-family:'Share Tech Mono',monospace;
  display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:20;
}
#flow-meter {
  position:fixed; right:14px; top:50%; transform:translateY(-50%);
  width:3px; height:120px; background:rgba(0,255,65,0.1);
  border:1px solid rgba(0,255,65,0.2); z-index:15; border-radius:2px; overflow:hidden;
}
#flow-fill {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top,#00ff41,#fff);
  transition:height 0.1s; box-shadow:0 0 8px #00ff41;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="one-title">O N E</div>
<div id="toggle-ui">x</div>
<div id="flow-meter"><div id="flow-fill" style="height:0%"></div></div>
<div id="ui">
  <div class="btn-row">
    <button onclick="startDemo()" id="btn-demo">DEMO</button>
    <button onclick="startMic()" id="btn-mic">MIC</button>
    <button onclick="startTabAudio()" id="btn-tab">TAB AUDIO</button>
  </div>
  <div id="status">_ awaiting signal _</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * DPR;
  H = canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  initColumns();
}
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789#@!$%&*';
const FONT_SIZE = 14;
let columns = [];
function initColumns() {
  const cols = Math.floor(W / (FONT_SIZE * DPR));
  columns = Array.from({length:cols}, function(_,i) {
    return {
      x: i * FONT_SIZE * DPR,
      y: Math.random() * H * -1,
      speed: 0.5 + Math.random() * 1.5,
      chars: Array.from({length:20}, function() { return CHARS[Math.floor(Math.random()*CHARS.length)]; }),
      charTimer: 0,
      length: 10 + Math.floor(Math.random()*20)
    };
  });
}
let audioCtx=null, analyser=null, fftData=null;
let amp=0, freqBands=new Array(8).fill(0);
let audioMode='none', flowState=0, demoT=0;
let frame=0, rings=[], lastRing=0;

function setupAnalyser(stream) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.75;
  analyser.minDecibels = -80;
  analyser.maxDecibels = -20;
  fftData = new Uint8Array(analyser.frequencyBinCount);
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);
}

function readAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(fftData);
  const sum = fftData.reduce(function(a,b){return a+b;}, 0);
  amp += (Math.min(1,(sum/(fftData.length*255))*6) - amp)*0.12;
  const bsz = Math.floor(fftData.length/8);
  for(let i=0;i<8;i++){
    let s=0;
    for(let j=0;j<bsz;j++) s+=fftData[i*bsz+j];
    freqBands[i]+=(Math.min(1,(s/(bsz*255))*6)-freqBands[i])*0.12;
  }
}

function startDemo() {
  if(audioCtx){audioCtx.close();audioCtx=null;analyser=null;}
  audioMode='demo'; setStatus('SIMULATION ACTIVE','live'); setActiveBtn('btn-demo');
}

function startMic() {
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
    .then(function(stream) {
      setupAnalyser(stream);
      audioMode='mic'; setStatus('MIC CONNECTED','live'); setActiveBtn('btn-mic');
    })
    .catch(function(e) { setStatus('MIC ERROR: '+e.name,'error'); });
}

function startTabAudio() {
  setStatus('SELECT TAB WITH AUDIO...','');
  navigator.mediaDevices.getDisplayMedia({
    video: { width: 1, height: 1 },
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  }).then(function(stream) {
    var audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) {
      setStatus('NO AUDIO — SHARE TAB & CHECK AUDIO BOX','error');
      stream.getTracks().forEach(function(t){t.stop();});
      return;
    }
    // Stop video track, keep audio
    stream.getVideoTracks().forEach(function(t){t.stop();});
    setupAnalyser(stream);
    audioMode='tab'; setStatus('TAB AUDIO LIVE','live'); setActiveBtn('btn-tab');
    audioTracks[0].onended = function() {
      setStatus('SIGNAL LOST',''); audioMode='none'; flowState=0;
    };
  }).catch(function(e) {
    setStatus('ERR: '+e.name,'error');
  });
}

function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.textContent='_ '+msg+' _'; el.className=cls||'';
}
function setActiveBtn(id){
  ['btn-demo','btn-mic','btn-tab'].forEach(function(b){document.getElementById(b).classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
let uiVisible=true;
document.getElementById('toggle-ui').onclick=function(){
  uiVisible=!uiVisible;
  document.getElementById('ui').classList.toggle('hidden',!uiVisible);
  document.getElementById('toggle-ui').textContent=uiVisible?'x':'=';
};

function drawMatrixRain(fl) {
  ctx.font = (FONT_SIZE*DPR)+"px 'Share Tech Mono',monospace";
  columns.forEach(function(col){
    col.charTimer++;
    col.y += col.speed*(1-fl*0.85)*DPR*0.8;
    if(col.charTimer % Math.max(2,Math.floor(8-fl*6))===0)
      col.chars[Math.floor(Math.random()*col.chars.length)]=CHARS[Math.floor(Math.random()*CHARS.length)];
    if(col.y > H+col.length*FONT_SIZE*DPR){ col.y=-col.length*FONT_SIZE*DPR; col.speed=0.5+Math.random()*1.5; }
    for(let i=0;i<col.chars.length;i++){
      const cy=col.y+i*FONT_SIZE*DPR;
      if(cy<0||cy>H) continue;
      const isHead=i===col.chars.length-1, fade=i/col.chars.length;
      let r,g,b,a;
      if(isHead){r=Math.floor(180+fl*75);g=255;b=Math.floor(180+fl*75);a=1;}
      else{r=Math.floor(fl*200*fade);g=Math.floor(200*fade+fl*55*fade);b=Math.floor(fl*20*fade);a=fade*(0.7+fl*0.3);}
      ctx.fillStyle='rgba('+r+','+g+','+b+','+a+')';
      ctx.fillText(col.chars[i],col.x,cy);
    }
  });
}

function drawFlowCore(fl) {
  if(fl<0.01) return;
  const cx=W/2,cy=H/2,maxR=Math.min(W,H)*0.35;
  const auraR=maxR*fl*(1+amp*0.3);
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,auraR);
  grd.addColorStop(0,'rgba(255,255,255,'+(0.15*fl)+')');
  grd.addColorStop(0.3,'rgba(0,255,65,'+(0.1*fl)+')');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(cx,cy,auraR,0,Math.PI*2); ctx.fill();
  if(fl>0.7){
    const scale=(fl-0.7)/0.3;
    ctx.save(); ctx.globalAlpha=scale;
    ctx.font='bold '+(48*DPR*scale)+"px 'Share Tech Mono',monospace";
    ctx.fillStyle='#fff'; ctx.shadowColor='#00ff41'; ctx.shadowBlur=30*DPR;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('ONE',cx,cy);
    ctx.shadowBlur=0; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.restore();
  }
}

function drawRings(fl) {
  rings=rings.filter(function(r){return r.alpha>0.01;});
  rings.forEach(function(ring){
    ring.r+=8*DPR; ring.alpha*=0.93;
    ctx.beginPath(); ctx.arc(W/2,H/2,ring.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,255,65,'+ring.alpha*fl+')';
    ctx.lineWidth=2*DPR; ctx.stroke();
  });
}

function loop(){
  requestAnimationFrame(loop); frame++;
  if(audioMode==='demo'){
    demoT+=0.04;
    const d=Math.min(1,0.2+0.6*Math.abs(Math.sin(demoT*0.6))+0.2*Math.random());
    amp+=(d-amp)*0.08;
    for(let i=0;i<8;i++) freqBands[i]+=(Math.random()*d-freqBands[i])*0.12;
  } else if(audioMode!=='none'){ readAudio(); }
  else { amp+=(0-amp)*0.05; }
  const targetFlow=audioMode!=='none'?amp:0;
  flowState+=(targetFlow-flowState)*0.04;
  if(amp>0.7&&frame-lastRing>40){ rings.push({r:0,alpha:1}); lastRing=frame; }
  document.getElementById('flow-fill').style.height=(flowState*100)+'%';
  const statusEl=document.getElementById('status');
  if(audioMode!=='none'){
    if(flowState>0.8){
      statusEl.textContent='_ FLOW STATE : ONE _'; statusEl.className='flow';
      document.getElementById('one-title').style.cssText='color:#fff;text-shadow:0 0 20px #00ff41,0 0 40px #00ff41;letter-spacing:0.8em;';
    } else if(flowState>0.4){
      document.getElementById('one-title').style.cssText='color:rgba(0,255,65,'+(0.4+flowState*0.6)+');text-shadow:0 0 '+(flowState*15)+'px #00ff41;letter-spacing:'+(0.4+flowState*0.4)+'em;';
    } else {
      document.getElementById('one-title').style.cssText='color:rgba(0,255,65,0.4);text-shadow:none;letter-spacing:0.4em;';
    }
  }
  ctx.fillStyle='rgba(0,0,0,'+(0.12+(1-flowState)*0.06)+')';
  ctx.fillRect(0,0,W,H);
  drawMatrixRain(flowState);
  drawFlowCore(flowState);
  drawRings(flowState);
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,200);});
loop();
</script>
</body>
</html>
